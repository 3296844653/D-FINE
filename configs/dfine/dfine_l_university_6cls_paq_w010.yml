# PaQ/BPAQI gate ablation: initial dynamic-pattern injection weight ~= 10%.
# sigmoid(-2.197) ~= 0.1000.

__include__:
  - dfine_l_university_6cls.yml

output_dir: ./output/dfine_l_university_6cls_paq_w010

DFINETransformer:
  use_paq_query: True
  paq_num_patterns: 100
  # PaQ gate init: sigmoid(-2.197) ~= 0.1000.
  paq_gate_init: -2.197

  # Keep BCQS disabled so this run measures PaQ/BPAQI alone.
  use_bcqs: False
