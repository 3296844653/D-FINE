# BCQS + AFDR combined experiment.
# Keeps the baseline config unchanged and enables both behavior-context query scoring
# and adaptive FDR offset scaling.

__include__:
  - dfine_l_university_6cls.yml


DFINETransformer:
  # BCQS: behavior-context query scoring before encoder top-k query selection.
  use_bcqs: True
  bcqs_kernel_size: 3
  bcqs_score_weight: 0.25

  # AFDR: adaptively scales the four FDR edge offsets for each decoder query.
  use_afdr: True
  afdr_range: 0.25
