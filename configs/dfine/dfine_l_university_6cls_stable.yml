# Stable baseline protocol for module selection.
# Keeps the current baseline architecture/data setup, and only adjusts the
# late fine-tuning schedule plus denoising noise strength.

__include__:
  - dfine_l_university_6cls.yml


output_dir: ./output/dfine_l_university_6cls_stable


lr_scheduler:
  type: MultiStepLR
  milestones: [72]
  gamma: 0.1


DFINETransformer:
  num_denoising: 80
  label_noise_ratio: 0.25
  box_noise_scale: 0.7
