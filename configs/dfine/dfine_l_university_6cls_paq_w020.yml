# PaQ/BPAQI gate ablation: initial dynamic-pattern injection weight ~= 20%.
# sigmoid(-1.386) ~= 0.2000.

__include__:
  - dfine_l_university_6cls.yml

output_dir: ./output/dfine_l_university_6cls_paq_w020

DFINETransformer:
  use_paq_query: True
  paq_num_patterns: 100
  # PaQ gate init: sigmoid(-1.386) ~= 0.2000.
  paq_gate_init: -1.386

  # Keep BCQS disabled so this run measures PaQ/BPAQI alone.
  use_bcqs: False
