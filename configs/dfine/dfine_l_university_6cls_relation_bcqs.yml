# Relation-Aware BCQS experiment config.
# Keeps the original baseline config unchanged.
# The module re-scores encoder query candidates with local neighborhood,
# global classroom-scene, and normalized spatial-position relation cues.

__include__:
  - dfine_l_university_6cls.yml


DFINETransformer:
  # RA-BCQS: relation-aware behavior-context query scoring before encoder top-k selection.
  use_relation_bcqs: True
  relation_bcqs_kernel_size: 3
  # RA-BCQS score weight: initial score head is zero-initialized, then learns this branch.
  relation_bcqs_score_weight: 0.25
