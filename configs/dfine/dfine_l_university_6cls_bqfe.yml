# BQFE single-module experiment.
# Keeps the baseline config unchanged and only enables Behavior Query Feature Enhancement.

__include__:
  - dfine_l_university_6cls.yml


DFINETransformer:
  # BQFE: enhance encoder memory before query scoring and bbox initialization.
  use_bqfe: True
  bqfe_kernel_size: 3
  bqfe_reduction: 4
  # Starts near the original query feature path to reduce early-training disruption.
  bqfe_init: 0.01
